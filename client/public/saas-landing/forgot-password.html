<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockPilot - Mot de passe oublie</title>
    <meta name="description" content="Reset password page" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true">
      <span class="blob blob-a"></span>
      <span class="blob blob-b"></span>
      <span class="blob blob-c"></span>
    </div>

    <header class="site-header">
      <a href="./index.html" class="brand">
        <span class="brand-mark">S</span>
        <span class="brand-text">StockPilot</span>
      </a>
      <div class="header-actions">
        <a href="./login.html" class="btn btn-ghost">Connexion</a>
      </div>
    </header>

    <main class="section section-shell auth-main">
      <section class="auth-wrap">
        <p class="eyebrow">Recuperation</p>
        <h1>Mot de passe oublie</h1>
        <p class="auth-hint">Version basique: reinitialisation locale via email.</p>

        <form id="forgotPasswordForm" class="auth-form" action="#" method="post">
          <label>
            Email du compte
            <input type="email" name="email" placeholder="nom@entreprise.com" required />
          </label>

          <label>
            Nouveau mot de passe
            <input type="password" name="newPassword" placeholder="6 caracteres minimum" required />
          </label>

          <label>
            Confirmer nouveau mot de passe
            <input type="password" name="confirmNewPassword" placeholder="Retapez le mot de passe" required />
          </label>

          <button type="submit" class="btn btn-primary">Reinitialiser</button>
        </form>

        <p id="formMessage" class="form-message" aria-live="polite"></p>

        <div class="auth-links">
          <a href="./login.html">Retour connexion</a>
          <a href="./create-account.html">Creer un compte</a>
        </div>
      </section>
    </main>

    <script src="./auth.js"></script>
  </body>
</html>
