<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockPilot - Admin Dashboard</title>
    <meta name="description" content="Admin dashboard" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-dashboard="admin">
    <div class="page-bg" aria-hidden="true">
      <span class="blob blob-a"></span>
      <span class="blob blob-b"></span>
      <span class="blob blob-c"></span>
    </div>

    <header class="site-header">
      <a href="./index.html" class="brand">
        <span class="brand-mark">S</span>
        <span class="brand-text">StockPilot</span>
      </a>
      <div class="header-actions">
        <a href="./index.html" class="btn btn-ghost">Accueil</a>
        <button id="logoutBtn" class="btn btn-secondary" type="button">Deconnexion</button>
      </div>
    </header>

    <main class="section section-shell">
      <section class="dashboard-head">
        <p class="eyebrow">Admin dashboard</p>
        <h1>Bonjour <span id="userName">Admin</span></h1>
        <p>Compte: <strong id="userEmail">-</strong> | Role: <strong id="userRole">admin</strong></p>
      </section>

      <section class="dashboard-grid">
        <article class="dashboard-box">
          <h3>Utilisateurs</h3>
          <p>154 comptes actifs</p>
        </article>
        <article class="dashboard-box">
          <h3>Produits</h3>
          <p>1 284 references en stock</p>
        </article>
        <article class="dashboard-box">
          <h3>Alertes critiques</h3>
          <p>7 produits sous seuil</p>
        </article>
        <article class="dashboard-box">
          <h3>Revenus mensuels</h3>
          <p>82 400 EUR ce mois</p>
        </article>
      </section>
    </main>

    <script src="./auth.js"></script>
  </body>
</html>
