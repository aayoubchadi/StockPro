<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockPilot - Connexion</title>
    <meta name="description" content="StockPilot login page" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true">
      <span class="blob blob-a"></span>
      <span class="blob blob-b"></span>
      <span class="blob blob-c"></span>
    </div>

    <header class="site-header">
      <a href="./index.html" class="brand">
        <span class="brand-mark">S</span>
        <span class="brand-text">StockPilot</span>
      </a>
      <div class="header-actions">
        <a href="./index.html" class="btn btn-ghost">Retour accueil</a>
      </div>
    </header>

    <main class="section section-shell auth-main">
      <section class="auth-wrap">
        <p class="eyebrow">Connexion</p>
        <h1>Bienvenue sur StockPilot</h1>
        <p>Connectez-vous pour piloter vos stocks, commandes et fournisseurs.</p>
        <p class="auth-hint">Test client: client@stockpilot.com / client1234</p>
        <p class="auth-hint">Test admin: admin@stockpilot.com / admin1234</p>

        <form id="loginForm" class="auth-form" action="#" method="post">
          <label>
            Email
            <input type="email" name="email" placeholder="nom@entreprise.com" required />
          </label>

          <label>
            Mot de passe
            <input type="password" name="password" placeholder="••••••••" required />
          </label>

          <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>

        <p id="formMessage" class="form-message" aria-live="polite"></p>

        <div class="auth-links">
          <a href="./forgot-password.html">Mot de passe oublie ?</a>
          <a href="./create-account.html">Creer un compte</a>
        </div>
      </section>
    </main>

    <script src="./auth.js"></script>
  </body>
</html>
